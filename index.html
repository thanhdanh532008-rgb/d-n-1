<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phạm Thanh Danh</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 80px;
        }

        img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
        }

        h1 {
            margin-top: 20px;
            font-size: 32px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: white;
            color: #333;
            border-radius: 25px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Thay link ảnh của bạn ở đây -->
    <img src="phamthanhdanh.jpeg" alt="avatar">

    <h1>Phạm Thanh Danh</h1>
    <p>Học sinh | Yêu công nghệ | Thích lập trình</p>

    <a href="#" class="btn">Liên hệ</a>
</div>

</body>
</html>
